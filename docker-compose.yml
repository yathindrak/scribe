services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_scribe_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: "ecto://postgres:postgres@db/social_scribe_dev"
    command: sh -c "mix setup && mix phx.server"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps_cache:/app/deps
      - build_cache:/app/_build
    depends_on:
      - db

volumes:
  postgres_data:
  deps_cache:
  build_cache:
